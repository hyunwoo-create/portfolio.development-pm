<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback
    // 서브 경로 접근 시 index.html로 리다이렉트하면서 원래 경로를 보존합니다.
    // 예: /portfolio.development-pm/a-game/ → /portfolio.development-pm/?p=/portfolio.development-pm/a-game/
    var pathSegmentsToKeep = 1; // /portfolio.development-pm/ 까지 유지
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
      encodeURIComponent(l.pathname.slice(1))
    );
  </script>
</head>
<body>
</body>
</html>
