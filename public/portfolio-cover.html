<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Cover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #F9F7F7;
      /* 화면에서는 A4 가로(Landscape) 비율(약 297:210)과 비슷한 느낌으로 보이게 설정 */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 슬라이드(A4 가로형) 고정 크기 컨테이너 */
    #slide-container {
      width: 297mm;
      height: 210mm;
      background: white;
      background-image: radial-gradient(circle at 100% 100%, #DBE2EF 0%, transparent 50%),
                        radial-gradient(circle at 0% 0%, #EBF1FA 0%, transparent 40%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(17, 45, 78, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 링크 설정 UI (화면 상단 고정) */
    #settings-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(17, 45, 78, 0.95);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 50;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
    }

    #settings-panel input {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #DBE2EF;
      color: #112D4E;
      width: 400px;
      font-size: 14px;
    }

    #settings-panel input:focus {
      outline: none;
      border-color: #3F72AF;
      box-shadow: 0 0 0 3px rgba(63, 114, 175, 0.3);
    }

    #settings-panel button {
      background: #3F72AF;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    #settings-panel button:hover {
      background: #5B63E4;
    }

    /* 포트폴리오 버튼 디자인 */
    #portfolio-btn {
      background: linear-gradient(135deg, #112D4E 0%, #3F72AF 100%);
      color: white;
      font-size: 24px;
      font-weight: 900;
      padding: 24px 64px;
      border-radius: 100px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 25px rgba(63, 114, 175, 0.4);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
    }

    #portfolio-btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 35px rgba(63, 114, 175, 0.5);
    }

    /* 인쇄(PDF) 전용 스타일 */
    @media print {
      @page {
        size: A4 landscape; /* A4 가로 방향 */
        margin: 0; /* 여백 제거 */
      }
      
      body {
        background-color: white;
        display: block;
      }
      
      #settings-panel {
        display: none !important; /* 설정 패널 숨김 */
      }

      #slide-container {
        box-shadow: none; /* 그림자 제거 */
        width: 297mm;
        height: 210mm;
        /* 인쇄 시 벡터를 보존하기 위한 설정 */
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hover 애니메이션 비활성화 */
      #portfolio-btn {
        transition: none !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- 1. 컨트롤 패널 (인쇄 시 숨겨짐) -->
  <div id="settings-panel">
    <label for="link-input" class="font-bold text-sm">연결할 링크:</label>
    <input type="url" id="link-input" placeholder="https://hyunwoo-create.github.io/portfolio.development-pm/..." value="https://hyunwoo-create.github.io/portfolio.development-pm/">
    <button onclick="updateLink()">적용</button>
    <button onclick="exportPDF()" style="background: #e74c3c; margin-left: 10px;">PDF로 추출하기</button>
  </div>

  <!-- 2. 슬라이드 본문 (A4 가로 사이즈) -->
  <div id="slide-container">
    
    <!-- 장식용 데코 요소들 -->
    <div class="absolute top-12 left-12 w-24 h-24 rounded-full bg-[#3F72AF]/10 blur-xl"></div>
    <div class="absolute bottom-16 right-16 w-40 h-40 rounded-full bg-[#112D4E]/5 blur-2xl"></div>

    <!-- 텍스트 영역 -->
    <div class="text-center z-10 mb-16">
      <p class="text-[#3F72AF] font-bold tracking-[0.2em] mb-4 uppercase text-sm">Game PM Portfolio</p>
      <h1 class="text-6xl font-black text-[#112D4E] tracking-tight leading-tight mb-6">
        준비된 게임 기획자,<br/>포트폴리오입니다.
      </h1>
      <p class="text-[#1A59A7]/70 text-lg">
        아래 버튼을 클릭하여 웹 포트폴리오로 바로 이동하실 수 있습니다.
      </p>
    </div>

    <!-- 인터랙티브 버튼 (링크 포함) -->
    <a href="https://hyunwoo-create.github.io/portfolio.development-pm/" target="_blank" id="portfolio-btn" class="z-10">
      포트폴리오 페이지 바로 가기
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    </a>

    <!-- 하단 워터마크/추가 정보 -->
    <div class="absolute bottom-8 left-0 right-0 text-center text-[#112D4E]/40 text-xs font-bold tracking-widest">
      CLICK THE BUTTON ABOVE TO VIEW PORTFOLIO
    </div>

  </div>

  <script>
    const linkInput = document.getElementById('link-input');
    const portfolioBtn = document.getElementById('portfolio-btn');

    // 1. 링크 적용 함수
    function updateLink() {
      const url = linkInput.value.trim();
      if (!url) {
        alert('링크를 입력해주세요.');
        return;
      }
      // 기본적인 URL 유효성 검사 (http/https 포함 여부)
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        alert('http:// 또는 https:// 로 시작하는 올바른 URL을 입력해주세요.');
        return;
      }
      
      portfolioBtn.href = url;
      
      // 시각적 피드백
      const originalText = portfolioBtn.innerHTML;
      portfolioBtn.innerHTML = `
        적용 완료!
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      `;
      setTimeout(() => {
        portfolioBtn.innerHTML = originalText;
      }, 1500);
    }

    // 엔터키 입력 시 링크 적용
    linkInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        updateLink();
      }
    });

    // 2. PDF 추출 함수 (window.print 호출)
    function exportPDF() {
      // 인쇄 전 마지막으로 입력된 링크를 자동으로 반영
      if (linkInput.value !== portfolioBtn.href) {
         portfolioBtn.href = linkInput.value.trim();
      }
      // 인쇄 대화상자 호출
      window.print();
    }
  </script>
</body>
</html>
