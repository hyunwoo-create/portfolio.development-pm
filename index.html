    <!-- SPA redirect restore (works with 404.html for GitHub Pages) -->
    <script>
      (function(){
        var q = window.location.search;
        if (q && q.indexOf('?p=') === 0) {
          var decoded = decodeURIComponent(q.slice(3));
          var path = '/' + decoded;
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
